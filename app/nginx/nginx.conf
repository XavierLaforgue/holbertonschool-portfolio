# =============================================================================
# Nginx configuration — reverse proxy + static file server + load balancer
# =============================================================================
#
# This configuration does three things:
#
# 1. SERVES THE REACT SPA
#    All requests that don't match /api/, /admin/, /media/, or /static/
#    get the front-end's index.html. This supports client-side routing
#    (React Router): refreshing /recipes/123 returns index.html, and
#    React Router handles the route in the browser.
#
# 2. REVERSE-PROXIES THE API
#    Requests to /api/ and /admin/ are forwarded to the Django back-end
#    (Gunicorn). Nginx uses an "upstream" block with round-robin load
#    balancing across all back-end replicas.
#
# 3. SERVES STATIC & MEDIA FILES DIRECTLY
#    /static/ and /media/ are served by Nginx from local volumes instead
#    of going through Django. This is much faster because Nginx is
#    optimized for static file delivery.
#
# =============================================================================

# ---------- upstream: back-end servers for load balancing ----------
# Nginx distributes requests across the servers listed here using
# round-robin (the default algorithm): each new request goes to the
# next server in the list, cycling back to the first after the last.
#
# Docker Compose DNS resolves "back-end" to all container IPs when the
# service is scaled (e.g., `docker compose up --scale back-end=3`).
# The `resolver` directive tells Nginx to use Docker's internal DNS
# and re-resolve periodically so it picks up new/removed containers.
upstream backend {
    # List individual servers for explicit round-robin.
    # With Docker Compose scaling, you can add more entries or use
    # a single DNS name with the resolver directive below.
    server back-end:8000;
}

server {
    # ---------- listen ----------
    # Port 80 inside the container. The compose file maps this to the
    # host port (e.g., 80:80 or 3000:80).
    listen 80;
    server_name localhost;

    # ---------- front-end (React SPA) ----------
    # Serve the built React app. `try_files` first looks for an exact
    # file match (CSS, JS, images), then falls back to index.html for
    # client-side routing (React Router).
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---------- API reverse proxy ----------
    # Forward /api/ requests to the Django back-end via the upstream
    # block defined above (round-robin load balancing).
    location /api/ {
        # proxy_pass sends the request to the upstream group.
        proxy_pass http://backend;

        # Pass the original client headers to Django so it knows the
        # real client IP and requested host (important for CORS,
        # logging, and ALLOWED_HOSTS).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Django admin reverse proxy ----------
    # Same as /api/ but for the Django admin panel.
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Django static files ----------
    # Served directly by Nginx from the shared volume (populated by
    # Django's collectstatic). Much faster than proxying to Django.
    location /static/ {
        alias /var/www/static/;
    }

    # ---------- media files (user uploads) ----------
    # Served directly by Nginx from the shared volume. In the future
    # these could be moved to S3/CDN, but for the MVP local storage
    # with Nginx serving is efficient enough.
    location /media/ {
        alias /var/www/media/;
    }
}
